<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>betPawa — Win Confirmed Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* Exact betPawa design tokens from production */
  :root {
    --bg-brand: #9ce800;
    --bg-brand-accent: #8dc63f;
    --bg-default: #f2f2f3;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e4e6e7;
    --bg-inverse-default: #252a2d;
    --bg-success: #ecfccb;
    --border-default: #e4e6e7;
    --text-primary: #252a2d;
    --text-secondary: #7a8185;
    --text-success: #5b8506;
    --text-on-brand: #252a2d;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Roboto', -apple-system, 'Segoe UI', Arial, sans-serif;
    background: var(--bg-default);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── Homepage (real Figma export, switched by breakpoint via <picture>) ─── */
  .homepage-wrap {
    display: flex; justify-content: center;
    background: var(--bg-default);
  }
  .homepage {
    display: block;
    width: 100%;
    max-width: 960px;
    height: auto;
  }
  /* At small widths images already use full viewport. At ≥600 we cap the wrap to match design */

  /* ─── Backdrop & modal ─── */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 26, 20, 0.55);
    opacity: 0;
    pointer-events: none;
    transition: opacity 360ms ease;
    z-index: 100;
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }

  .modal {
    position: fixed;
    top: 50%; left: 50%;
    width: calc(100% - 32px);
    max-width: 400px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    background: var(--bg-secondary);
    border-radius: 28px;
    padding: 24px 24px 16px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.22);
    transform: translate(-50%, calc(-50% + 100vh));
    opacity: 0;
    transition:
      transform 620ms cubic-bezier(.22, 1.13, .45, 1),
      opacity 360ms ease;
    z-index: 101;
    display: flex; flex-direction: column;
  }
  .modal.show {
    transform: translate(-50%, -50%);
    opacity: 1;
  }

  .modal .close {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    line-height: 1;
  }
  .modal .close:hover { background: #d8dadb; }

  .modal h1 {
    margin: 6px 0 0;
    font-size: 24px; font-weight: 700;
    text-align: center;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .modal .badge-wrap {
    margin: 6px auto 0;
    width: 170px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal .badge {
    max-width: 100%; max-height: 100%;
    display: block;
  }
  .modal .body {
    margin: 6px 0 0;
    font-size: 14px;
    text-align: center;
    color: var(--text-secondary);
  }
  .modal .amount {
    margin-top: 4px;
    text-align: center;
    font-size: 40px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .modal .ugx {
    margin-top: 0;
    text-align: center;
    font-size: 12px; font-weight: 700;
    color: var(--text-success);
    letter-spacing: 1px;
  }
  .modal .odds-pill {
    margin: 14px auto 0;
    background: var(--bg-success);
    color: var(--text-success);
    padding: 6px 14px;
    border-radius: 14px;
    font-size: 13px;
    width: fit-content;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .modal .odds-pill .with, .modal .odds-pill .label { color: var(--text-secondary); font-weight: 400; }
  .modal .odds-pill .num { font-weight: 700; color: var(--text-success); }
  .modal .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
  .modal .btn {
    height: 40px;
    border-radius: 4px;
    border: none;
    font-family: inherit;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .modal .btn.primary {
    background: var(--bg-brand);
    color: var(--text-on-brand);
  }
  .modal .btn.primary:hover { background: var(--bg-brand-accent); }
  .modal .btn.outline {
    background: transparent;
    border: 1.5px solid var(--border-default);
    color: var(--text-primary);
  }
  .modal .btn.outline:hover { background: #f5f7f5; }
  .modal hr {
    border: none;
    border-top: 1px solid var(--border-default);
    margin: 14px 0 10px;
  }
  .modal .checkbox {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer; user-select: none;
  }
  .modal .checkbox input { accent-color: var(--text-success); width: 16px; height: 16px; }

  /* ─── Tier switcher (utility overlay) ─── */
  .tier-switcher {
    position: fixed;
    top: 12px; right: 12px;
    background: #fff;
    border-radius: 10px;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    z-index: 200;
  }
  @media (min-width: 720px) {
    .tier-switcher { top: 16px; right: 16px; flex-direction: row; }
  }
  .tier-switcher button {
    background: transparent; border: none;
    padding: 6px 10px;
    font-size: 11px; font-weight: 700;
    color: #555;
    cursor: pointer;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-family: inherit;
  }
  .tier-switcher button.active { background: var(--bg-brand); color: var(--text-on-brand); }
  .tier-switcher button:not(.active):hover { background: #f3f5f4; }

  .hint {
    position: fixed; bottom: 16px; left: 16px;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    user-select: none;
    z-index: 50;
  }
</style>
</head>
<body>

<div class="tier-switcher" id="tierSwitch">
  <button data-tier="bronze">Bronze</button>
  <button data-tier="silver">Silver</button>
  <button data-tier="gold">Gold</button>
  <button data-tier="platinum">Platinum</button>
  <button data-tier="diamond">Diamond</button>
</div>

<!-- Real Figma export of the homepage, swapped by viewport width -->
<div class="homepage-wrap">
  <picture>
    <source media="(max-width: 359px)" srcset="assets/home-320.png" />
    <source media="(max-width: 519px)" srcset="assets/home-376.png" />
    <img class="homepage" src="assets/home-600.png" alt="betPawa homepage" />
  </picture>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="modal" id="modal">
  <button class="close" id="closeBtn" aria-label="Close">×</button>
  <h1 id="title">You called it.</h1>
  <div class="badge-wrap">
    <img class="badge" id="badge" src="assets/bronze.png" alt="" />
  </div>
  <p class="body" id="body">Right on the money:</p>
  <div class="amount" id="amount">2,647.60</div>
  <div class="ugx">UGX</div>
  <div style="text-align:center;">
    <div class="odds-pill">
      <span class="with">with</span>
      <span class="num" id="odds">5.67×</span>
      <span class="label">odds</span>
    </div>
  </div>
  <div class="actions">
    <button class="btn primary">SHARE YOUR WIN</button>
    <button class="btn outline">VIEW BETSLIP</button>
  </div>
  <hr />
  <label class="checkbox">
    <input type="checkbox" />
    Turn off win notifications for 30 days
  </label>
</div>

<div class="hint">Press R to replay · Esc to close</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
const tiers = {
  bronze: {
    badge: 'assets/bronze.png',
    title: 'You called it.',
    body: 'Right on the money:',
    amount: '2,647.60',
    odds: '5.67×',
    colors: ['#6B3F1F', '#B8703D', '#D89060', '#F4A57E', '#FFD49A']
  },
  silver: {
    badge: 'assets/silver.png',
    title: "You're untouchable.",
    body: 'Untouchable reward:',
    amount: '112,132.30',
    odds: '123.03×',
    colors: ['#8A95A2', '#A8B2BD', '#C8D0D8', '#E5E9ED', '#ffffff']
  },
  gold: {
    badge: 'assets/gold.png',
    title: 'On top of your game.',
    body: 'Crowning your run:',
    amount: '52,347.60',
    odds: '56.90×',
    colors: ['#B8841A', '#E5A823', '#F4C842', '#FFD966', '#FFF0A0']
  },
  platinum: {
    badge: 'assets/platinum.png',
    title: 'That was pure class.',
    body: 'Classy payout:',
    amount: '24,427.20',
    odds: '26.89×',
    colors: ['#7B8A99', '#A0AEC0', '#CBD5E0', '#FFB6D9', '#A8E5F5']
  },
  diamond: {
    badge: 'assets/diamond.png',
    title: 'Legendary play.',
    body: 'Legendary haul:',
    amount: '100,005,000.60',
    odds: '1023.87×',
    colors: ['#1E3A8A', '#2563EB', '#4A90E2', '#7BB3F0', '#A8DCFF']
  }
};

const titleEl = document.getElementById('title');
const bodyEl = document.getElementById('body');
const amountEl = document.getElementById('amount');
const oddsEl = document.getElementById('odds');
const badgeEl = document.getElementById('badge');
const modalEl = document.getElementById('modal');
const backdrop = document.getElementById('backdrop');
const closeBtn = document.getElementById('closeBtn');
const tierSwitch = document.getElementById('tierSwitch');

let currentTier = (new URLSearchParams(location.search).get('tier')) || 'bronze';
if (!tiers[currentTier]) currentTier = 'bronze';

function setActiveTierButton(tier) {
  for (const btn of tierSwitch.querySelectorAll('button')) {
    btn.classList.toggle('active', btn.dataset.tier === tier);
  }
}

function fitAmount(el) {
  el.style.fontSize = '40px';
  let size = 40;
  const parentW = el.parentElement.clientWidth - 4;
  while (size > 18 && el.scrollWidth > parentW) {
    size -= 1;
    el.style.fontSize = size + 'px';
  }
}

function loadTier(tier) {
  currentTier = tier;
  setActiveTierButton(tier);
  const t = tiers[tier];
  titleEl.textContent = t.title;
  bodyEl.textContent = t.body;
  amountEl.textContent = t.amount;
  oddsEl.textContent = t.odds;
  badgeEl.src = t.badge;
  badgeEl.onload = () => fitAmount(amountEl);
  fitAmount(amountEl);
}

function showWin() {
  backdrop.classList.add('show');
  setTimeout(() => modalEl.classList.add('show'), 120);
  setTimeout(burstConfetti, 380);
}
function hideWin() {
  backdrop.classList.remove('show');
  modalEl.classList.remove('show');
}

function burstConfetti() {
  const rect = badgeEl.getBoundingClientRect();
  const x = (rect.left + rect.width / 2) / window.innerWidth;
  const y = (rect.top + rect.height / 2) / window.innerHeight;
  const t = tiers[currentTier];
  confetti({
    particleCount: 160,
    spread: 110,
    origin: { x, y },
    colors: t.colors,
    scalar: 1.8,
    startVelocity: 55,
    gravity: 0.9,
    ticks: 280,
    zIndex: 200
  });
}

closeBtn.addEventListener('click', hideWin);
backdrop.addEventListener('click', hideWin);
for (const btn of tierSwitch.querySelectorAll('button')) {
  btn.addEventListener('click', () => {
    hideWin();
    loadTier(btn.dataset.tier);
    setTimeout(showWin, 250);
  });
}
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'r') { hideWin(); setTimeout(showWin, 250); }
  if (e.key === 'Escape') hideWin();
});

loadTier(currentTier);
window.addEventListener('load', () => setTimeout(showWin, 650));
</script>
</body>
</html>
